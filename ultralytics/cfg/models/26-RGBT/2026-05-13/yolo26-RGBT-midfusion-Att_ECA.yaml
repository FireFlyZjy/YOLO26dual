# Ultralytics YOLO11 RGBT midfusion with Att_ECA attention
# 基于模板: yolo26-RGBT-midfusion.yaml
# 修改日期: 2026-05-13
# 改进说明: 在双模态P3/P4/P5 Concat融合之后各插入一个Att_ECA注意力模块
# 注意力作用: ECA-Net: 自适应核大小Conv1d通道交互, 几乎零参数开销的轻量通道注意力
#
# 【与基线模板的差异】
# + 新增行: 每个Concat融合层之后添加 [-1, 1, Att_ECA, [c2]]
#   - P3: 22层, Concat(21) -> Att_ECA(22), 通道512
#   - P4: 24层, Concat(23) -> Att_ECA(24), 通道512
#   - P5: 26层, Concat(25) -> Att_ECA(26), 通道1024
# ~ Head修改: 因backbone新增3层, head中全部layer index +3
#   - Concat引用: 21->22, 22->24, 25->28
#   - Detect输入层: [31,34,37] -> [34,37,40]
#
# Parameters
nc: 3 # number of classes
# [YOLO26] 端到端NMS-free + 无DFL直接回归
end2end: True  # 原生无NMS，零等待恒定推理延迟
reg_max: 1     # 移除DFL分布焦点损失，直接L1坐标回归
scales: # model compound scaling constants
  # [depth, width, max_channels]
  s: [0.50, 0.50, 1024]

ch: 4
# YOLO11 backbone (visible + infrared dual branches)
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Silence, []]  # 0-P1/2
    # visible branch
  - [0, 1, SilenceChannel, [0,3]]  # 1-P1/2
  - [-1, 1, Conv, [64, 3, 2]] # 2-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 3-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]] # 5-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]] # 7-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]] # 9-P5/32
  - [-1, 2, C3k2, [1024, True, 0.5, True]] # 10

    # infrared branch
  - [0, 1, SilenceChannel, [3,4]]  # 11-P1/2
  - [-1, 1, Conv, [64, 3, 2]] # 12-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 13-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]] # 15-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]] # 17-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]] # 19-P5/32
  - [-1, 2, C3k2, [1024, True, 0.5, True]] # 20

  # ---- 双模态融合 + 注意力 (2026-05-13 新增) ----
  - [[6, 16], 1, Concat, [1]]  # 21-P3 fusion (可见光P3 + 红外P3)
  - [-1, 1, Att_ECA, [512]]      # 22-P3 ATTN ← 新增: 对P3融合特征做注意力
  - [[8, 18], 1, Concat, [1]]  # 23-P4 fusion (可见光P4 + 红外P4)
  - [-1, 1, Att_ECA, [512]]      # 24-P4 ATTN ← 新增: 对P4融合特征做注意力
  - [[10, 20], 1, Concat, [1]] # 25-P5 fusion (可见光P5 + 红外P5)
  - [-1, 1, Att_ECA, [1024]]     # 26-P5 ATTN ← 新增: 对P5融合特征做注意力

  - [-1, 1, SPPF, [1024, 5, 3, True]] # 27-SPPF (原24, +3)
  - [-1, 2, C2PSA, [1024]] # 28-C2PSA (原25, +3)

# YOLO11 head (layer index 全量 +3)
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 29 (原26, +3)
  - [[-1, 24], 1, Concat, [1]]                    # 30 ← 引用P4 Att(layer24), 原引用P4 Concat(layer22)
  - [-1, 2, C3k2, [512, False]]                   # 31 (原28, +3)

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 32 (原29, +3)
  - [[-1, 22], 1, Concat, [1]]                    # 33 ← 引用P3 Att(layer22), 原引用P3 Concat(layer21)
  - [-1, 2, C3k2, [256, False]]                   # 34 (原31, +3)

  - [-1, 1, Conv, [256, 3, 2]]                    # 35 (原32, +3)
  - [[-1, 31], 1, Concat, [1]]                    # 36 ← 引用head C3k2(layer31), 原引用layer28
  - [-1, 2, C3k2, [512, False]]                   # 37 (原34, +3)

  - [-1, 1, Conv, [512, 3, 2]]                    # 38 (原35, +3)
  - [[-1, 28], 1, Concat, [1]]                    # 39 ← 引用C2PSA(layer28), 原引用layer25
  - [-1, 2, C3k2, [1024, True, 0.5, True]]        # 40 (原37, +3)

  - [[34, 37, 40], 1, Detect, [nc]]               # 41 ← 原[31,34,37], 全部+3
