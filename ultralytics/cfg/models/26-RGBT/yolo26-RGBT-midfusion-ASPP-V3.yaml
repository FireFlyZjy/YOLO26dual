# Ultralytics YOLO11 object detection model with P3/8 - P5/32 outputs
# Model docs: https://docs.ultralytics.com/models/yolo11
# Task docs: https://docs.ultralytics.com/tasks/detect

# Parameters
nc: 3 # number of classes
# [YOLO26] 端到端NMS-free + 无DFL直接回归
end2end: True  # 原生无NMS，零等待恒定推理延迟
reg_max: 1     # 移除DFL分布焦点损失，直接L1坐标回归
scales: # model compound scaling constants, i.e. 'model=yolo11n.yaml' will call yolo11.yaml with scale 'n'
  # [depth, width, max_channels]
#  n: [0.50, 0.25, 1024] # summary: 319 layers, 2624080 parameters, 2624064 gradients, 6.6 GFLOPs
  s: [0.50, 0.50, 1024] # summary: 319 layers, 9458752 parameters, 9458736 gradients, 21.7 GFLOPs
#  m: [0.50, 1.00, 512] # summary: 409 layers, 20114688 parameters, 20114672 gradients, 68.5 GFLOPs
#  l: [1.00, 1.00, 512] # summary: 631 layers, 25372160 parameters, 25372144 gradients, 87.6 GFLOPs
#  x: [1.00, 1.50, 512] # summary: 631 layers, 56966176 parameters, 56966160 gradients, 196.0 GFLOPs

ch: 4
# YOLOv8.0n backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Silence, []]  # 0-P1/2
    # visible
  - [0, 1, SilenceChannel, [0,3]]  # 1-P1/2
  - [-1, 1, Conv, [64, 3, 2]] # 2-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 3-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]] # 4
  - [-1, 1, Conv, [256, 3, 2]] # 5-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]] # 6 (P3)
  - [-1, 1, Conv, [512, 3, 2]] # 7-P4/16
  - [-1, 2, C3k2, [512, True]] # 8 (P4)
  - [-1, 1, Conv, [1024, 3, 2]] # 9-P5/32 (可见光下采样，保持原样)

  # --- 增强可见光深层感受野 ---
  - [-1, 1, ASPP_Branch, [1024, 2]] # 10 (带膨胀率提取，不改变尺寸)
  - [-1, 2, C3k2, [1024, True, 0.5, True]] # 11 (P5)

  # infrared
  - [ 0, 1, SilenceChannel, [ 3,4 ] ]  # 12-P1/2
  - [ -1, 1, Conv, [ 64, 3, 2 ] ] # 13-P1/2
  - [ -1, 1, Conv, [ 128, 3, 2 ] ] # 14-P2/4
  - [ -1, 2, C3k2, [ 256, False, 0.25 ] ] # 15
  - [ -1, 1, Conv, [ 256, 3, 2 ] ] # 16-P3/8
  - [ -1, 2, C3k2, [ 512, False, 0.25 ] ] # 17 (P3)
  - [ -1, 1, Conv, [ 512, 3, 2 ] ] # 18-P4/16
  - [ -1, 2, C3k2, [ 512, True ] ] # 19 (P4)
  - [ -1, 1, Conv, [ 1024, 3, 2 ] ] # 20-P5/32 (红外下采样，保持原样)

  # --- 增强红外深层感受野 ---
  - [ -1, 1, ASPP_Branch, [ 1024, 2 ] ] # 21 (带膨胀率提取，不改变尺寸)
  - [ -1, 2, C3k2, [ 1024, True , 0.5, True] ]  # 22 (P5)

  # --- 多模态融合 Concat (索引已重新校对) ---
  - [[6, 17], 1, Concat, [1]]  # cat backbone P3   23
  - [[8, 19], 1, Concat, [1]]  # cat backbone P4   24
  - [[11, 22], 1, Concat, [1]] # cat backbone P5   25

  - [ -1, 1, SPPF, [ 1024, 5, 3, True ] ] # 26
  - [ -1, 2, C2PSA, [ 1024 ] ] # 27

# YOLO11n head
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 24], 1, Concat, [1]] # 29: cat backbone P4 (指向新的 24)
  - [-1, 2, C3k2, [512, False]] # 30

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 23], 1, Concat, [1]] # 32: cat backbone P3 (指向新的 23)
  - [-1, 2, C3k2, [256, False]] # 33 (P3/8-small)

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 30], 1, Concat, [1]] # 35: cat head P4 (指向新的 30)
  - [-1, 2, C3k2, [512, False]] # 36 (P4/16-medium)

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 27], 1, Concat, [1]] # 38: cat head P5 (指向新的 27)
  - [-1, 2, C3k2, [1024, True, 0.5, True]] # 39 (P5/32-large)

  - [[33, 36, 39], 1, Detect, [nc]] # 40: Detect(P3, P4, P5) 更新层数