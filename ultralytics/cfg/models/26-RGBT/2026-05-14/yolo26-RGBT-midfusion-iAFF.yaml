# Ultralytics YOLO11 RGBT midfusion with iAFF (iterative AFF)
# 基于模板: yolo26-RGBT-midfusion.yaml
# 修改日期: 2026-05-14
# 来源: AFF https://arxiv.org/abs/2002.10151
#
# 【与基线模板的差异】
# ~ 修改: 3处Concat替换为Att_iAFF (智能注意力融合替代简单拼接)
#   - 原: [[6, 16], 1, Concat, [1]] -> [[6, 16], 1, Att_iAFF, [512]]
#   - 原: [[8, 18], 1, Concat, [1]] -> [[8, 18], 1, Att_iAFF, [512]]
#   - 原: [[10, 20], 1, Concat, [1]] -> [[10, 20], 1, Att_iAFF, [1024]]
# ~ 其余层号和引用不变 (输出通道与Concat一致)
#
nc: 3
# [YOLO26] 端到端NMS-free + 无DFL直接回归
end2end: True  # 原生无NMS，零等待恒定推理延迟
reg_max: 1     # 移除DFL分布焦点损失，直接L1坐标回归
scales:
  s: [0.50, 0.50, 1024]

ch: 4
backbone:
  - [-1, 1, Silence, []]
    # visible
  - [0, 1, SilenceChannel, [0,3]]
  - [-1, 1, Conv, [64, 3, 2]]
  - [-1, 1, Conv, [128, 3, 2]]
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]]
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]]
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]]
  - [-1, 2, C3k2, [1024, True, 0.5, True]]

    # infrared
  - [0, 1, SilenceChannel, [3,4]]
  - [-1, 1, Conv, [64, 3, 2]]
  - [-1, 1, Conv, [128, 3, 2]]
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]]
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]]
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]]
  - [-1, 2, C3k2, [1024, True, 0.5, True]]

  # ---- 双模态融合 (AFF替代Concat) ----
  - [[6, 16], 1, Att_iAFF, [512]]   # 21-P3 iAFF融合 ← 原Concat
  - [[8, 18], 1, Att_iAFF, [512]]   # 22-P4 iAFF融合 ← 原Concat
  - [[10, 20], 1, Att_iAFF, [1024]] # 23-P5 iAFF融合 ← 原Concat

  - [-1, 1, SPPF, [1024, 5, 3, True]]
  - [-1, 2, C2PSA, [1024]]

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 22], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]]
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 21], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, False]]
  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 28], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, False]]
  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 25], 1, Concat, [1]]
  - [-1, 2, C3k2, [1024, True, 0.5, True]]
  - [[31, 34, 37], 1, Detect, [nc]]
